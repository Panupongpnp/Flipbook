<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio Flipbook — ผลงานด้านวิชาการ นวัตกรรม ไฟฟ้า และคอมพิวเตอร์">
  <meta name="theme-color" content="#0D0D0D">
  <title>My Portfolio.Flipbook</title>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📕</text></svg>">

  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <canvas id="bg-particles" aria-hidden="true"></canvas>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="corner-decor corner-decor--tl" aria-hidden="true"></div>
  <div class="corner-decor corner-decor--tr" aria-hidden="true"></div>
  <div class="corner-decor corner-decor--bl" aria-hidden="true"></div>
  <div class="corner-decor corner-decor--br" aria-hidden="true"></div>

  <div class="page-wrapper">

    <div id="header-placeholder"></div>

    <main class="main-content" id="main-content">
      <section class="flipbook-section" data-animate>

        <h1 class="sr-only">Portfolio Flipbook</h1>
        <p class="flipbook-title" data-animate>Portfolio Collection</p>

        <div class="flipbook-container" id="flipbook-container" data-animate>

          <div id="flipbook"></div>

          <div class="flipbook-loading" id="flipbook-loading">
            <div class="flipbook-loading-spinner"></div>
            <p class="flipbook-loading-text">Loading Portfolio...</p>
          </div>

          <div class="flipbook-upload-area" id="flipbook-upload-area" style="display:none;">
            <h2 class="flipbook-upload-title">Upload Your Portfolio PDF</h2>
            <p class="flipbook-upload-desc">Drag &amp; drop a PDF file here, or click to browse</p>
            <button class="flipbook-upload-btn" type="button">Choose PDF File</button>
            <p class="flipbook-upload-desc"
              style="margin-top: var(--space-3); opacity:0.6; font-size: var(--fs-xs); max-width: 400px; line-height: 1.6;">

            </p>
            <input type="file" id="pdf-file-input" accept="application/pdf" style="display:none;">
          </div>

        </div>

        <div class="flipbook-controls" id="flipbook-controls" style="display:none;" data-animate>
          <button class="flipbook-btn" id="flipbook-prev" disabled aria-label="Previous page">
            <svg viewBox="0 0 24 24">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>

          <div class="flipbook-page-info">
            <span class="flipbook-page-current" id="page-current">1</span>
            <span class="flipbook-page-divider">/</span>
            <span class="flipbook-page-total" id="page-total">1</span>
          </div>

          <button class="flipbook-btn" id="flipbook-next" aria-label="Next page">
            <svg viewBox="0 0 24 24">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>

          <button class="flipbook-btn flipbook-btn-change" id="change-pdf-btn" aria-label="Change PDF"
            title="เปลี่ยน PDF">
            <svg viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"></path>
            </svg>
          </button>
          <input type="file" id="change-pdf-input" accept="application/pdf" style="display:none;">
        </div>

        <div class="flipbook-progress" data-animate>
          <div class="flipbook-progress-bar" id="flipbook-progress-bar" style="width: 0%"></div>
        </div>

        <div class="flipbook-hint" data-animate>
          <kbd>←</kbd> <kbd>→</kbd> <span>or drag page corners to flip</span>
        </div>

      </section>
    </main>

    <div id="footer-placeholder"></div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/flipbook.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
